name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
env:
  PLUGIN_NAME: obsidian-latex-math-smart-solve

jobs:
  # Tests already ran on push.yml for the commit this tag points at, plus the
  # local pre-push hook. Re-running them here gates the release behind ~3m of
  # cross-OS plugin tests for no extra signal. Code-quality is intentionally
  # deferred (see plugin-build needs / "add back for 2.0" note below).

  version-match-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Runs against the runner's default python3 — version-check.py uses only
      # stdlib (json, sys), so we skip actions/setup-python (~30s saved).
      - name: Check Version
        run: python3 version-check.py "${{ github.ref_name }}"

  cas-client-build:
    runs-on: ${{ matrix.os.os_name }}
    strategy:
      matrix:
        os:
          - os_name: windows-latest
            rel_name: win
          - os_name: macos-latest
            rel_name: macos
          - os_name: ubuntu-latest
            rel_name: linux

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Pip Dependencies
        shell: bash
        id: install-pip-dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate || . .venv/Scripts/activate
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Build Executable
        id: build-executable
        shell: bash
        run: |
          source .venv/bin/activate || . .venv/Scripts/activate
          pyinstaller \
          --onefile \
          --paths ./lmat-cas-client \
          --collect-data sympy \
          --add-data "./lmat-cas-client/lmat_cas_client/compiling/parsing/greek_symbols.lark:lmat_cas_client/compiling/parsing" \
          --add-data "./lmat-cas-client/lmat_cas_client/compiling/parsing/latex_math_grammar.lark:lmat_cas_client/compiling/parsing" \
          --add-data "./lmat-cas-client/lmat_cas_client/ggb_plot/geogebra.xml:lmat_cas_client/ggb_plot" \
          --name lmat-cas-client-${{ matrix.os.rel_name }} \
          lmat-cas-client/lmat-cas-client.py
      - name: Rename Executable
        id: rename-executable
        shell: bash
        run: |
          mv ./dist/lmat-cas-client-${{ matrix.os.rel_name }}.exe ./dist/lmat-cas-client-${{ matrix.os.rel_name }}.bin \
          || mv ./dist/lmat-cas-client-${{ matrix.os.rel_name }} ./dist/lmat-cas-client-${{ matrix.os.rel_name }}.bin

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: lmat-cas-client-${{ matrix.os.rel_name }}
          path: |
            ./dist/lmat-cas-client-${{ matrix.os.rel_name }}.bin

  plugin-build:
    runs-on: ubuntu-latest
    # Tests + code-quality intentionally not gating the release tag — see top comment.
    needs: [ cas-client-build, version-match-check ]
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Download Cas Clients
        uses: actions/download-artifact@v4
        with:
          pattern: lmat-cas-client-*
          path: ./bundle-bin

      - name: Build Plugin
        run: |
          npm ci
          npm run build

      - name: Zip Plugin
        run: zip plugin.zip main.js styles.css manifest.json
      - name: Zip Bundle Bin
        run: zip -r bundle-bin.zip ./bundle-bin

      - name: Create Release With Assets
        id: create-release-with-assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            # Release ${{ github.ref_name }}

            Fork of [obsidian-latex-math](https://github.com/zarstensen/obsidian-latex-math) adding the **Smart Solve** dispatch — notebook-style implicit definitions, section-scoped contexts, constraint accumulation. See [design_docs.md](design_docs.md) for the full feature set.

            ## Install via BRAT

            1. Install [BRAT](https://obsidian.md/plugins?id=obsidian42-brat) in Obsidian.
            2. Run the `BRAT: Add a beta plugin for testing` command.
            3. Paste this repo's URL and pick the latest version (or this tag).
            4. Bind `Alt+B` to **Smart Solve LaTeX expression** in Settings → Hotkeys.
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            bundle-bin.zip
            plugin.zip
            main.js
            manifest.json
            styles.css
